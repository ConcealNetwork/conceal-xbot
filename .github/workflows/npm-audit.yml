name: npm-audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Enable Socket Firewall Free
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f
        with:
          mode: firewall-free

      - name: Verify lockfile exists
        run: test -f package-lock.json

      - name: Audit package-lock.json
        run: npx --yes package-lock-audit package-lock.json

      - name: Install dependencies
        run: sfw npm ci

      - name: Run npm audit
        run: sfw npm audit --audit-level=high